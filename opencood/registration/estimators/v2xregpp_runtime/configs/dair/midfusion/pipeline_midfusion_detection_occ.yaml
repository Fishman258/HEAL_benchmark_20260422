data:
  dataset: DAIR-V2X
  split: test
  data_info_path: data/data_info_top3000.json
  data_root: data/DAIR-V2X/cooperative-vehicle-infrastructure
  detection_cache: data/DAIR-V2X/detected/veh_rsu_dual_bevdesc/stage1_boxes.json
  use_detection: true
  detection_field: pred_corner3d_np_list
  use_features: false
  noise:
    pos_std: 0
    rot_std: 0
  max_samples: 3000
filters:
  top_k: 15
  distance_m: 120
  priority_categories: [bus, truck, car]
  min_confidence: 0.0
matching:
  # Mid-fusion: use dense occupancy feature correlation to seed an extrinsic
  # (occ_hint), then select correspondences under that hint (prior_weight > 0).
  strategy: ['category', 'core']
  core_components: ['centerpoint_distance', 'vertex_distance']
  filter_strategy: thresholdRetained
  filter_threshold: 4
  matches2extrinsic: weightedSVD
  svd_strategy: svd_with_match
  distance_thresholds:
    truck: 1.5
    van: 1.5
    bus: 1.5
    car: 1.0
    trafficcone: 0.5
    pedestrian: 0.5
    cyclist: 0.5
    motorcyclist: 0.5
    tricylist: 0.5
    barrawlist: 0.5
    detected: 1.0
  prior_weight: 5.0
  hint_core_component: centerpoint_distance
  hint_assignment: greedy
  occ_hint_rotation_max_deg: 180.0
  occ_hint_rotation_step_deg: 15.0
  parallel_flag: false
  corresponding_parallel: true
solver:
  stability_gate: 3
  max_iterations: 2
  inlier_threshold_m: 1.25
  mad_scale: 2.5
  min_inliers: 3
evaluation:
  success_thresholds: [1.0, 2.0, 3.0]
  time_verbose: false
output:
  root_dir: outputs
  tag: dair_v2xregpp_pp15_midfusion_occ
