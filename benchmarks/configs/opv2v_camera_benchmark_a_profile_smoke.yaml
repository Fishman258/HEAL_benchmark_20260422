# Smoke version of the OPV2V camera-depth Benchmark A profile run.
# It exercises the full benchmark chain with a tiny sample count.
schema_version: benchmark_launcher_config_v1
name: opv2v_camera_benchmark_a_profile_smoke
launcher: benchmarks/launchers/run_opv2v_benchmark_a_profile.py

args:
  python-bin: /home/qqxluca/miniconda3/envs/heal/bin/python
  model-dir: /home/qqxluca/projects/v2xreg_private/HEAL/opencood/logs/opv2v_camera_v2xvit_full_prope
  stage1-result: /home/qqxluca/HEAL_benchmark_20260422/outputs/image_depth_stage1_cache/run_20260513_191711_opv2v_image_depth_camera_model_fullprope_full2170/test/stage1_boxes_image_depth_camera_model.json
  test-dir: /data2/OPV2V/test
  depth-root: /data2/opv2v_depth/test

  # Execution scale.
  gpus: "0"
  max-parallel: 1
  max-eval-samples: 2
  eval-sample-start: 0

  # Benchmark A settings.
  noises: [0, 1]
  core-noises: [0]
  oracle-anchor-noise: 1
  methods: v2xregpp
  bounds: baseline,single,oracle

  # Runtime options.
  comm-range: 70.0
  force-pose-confidence: 1.0
  save-vis-interval: 0
  num-workers: 0
  log-interval: 1
  launch-delay-sec: 0.2
  poll-sec: 2.0
  note: refactor_phase1_smoke
