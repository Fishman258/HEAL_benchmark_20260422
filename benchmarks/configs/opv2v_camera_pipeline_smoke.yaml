# Staged smoke pipeline for OPV2V camera-depth Benchmark A.
# This is the reference config shape for benchmark runs.
schema_version: benchmark_pipeline_config_v1
name: opv2v_camera_pipeline_smoke
note: refactor_stage_pipeline_smoke
output_root: outputs/pipelines

stages:
  detection:
    enabled: true
    mode: existing_stage1
    stage1_result: /home/qqxluca/HEAL_benchmark_20260422/outputs/image_depth_stage1_cache/run_20260513_191711_opv2v_image_depth_camera_model_fullprope_full2170/test/stage1_boxes_image_depth_camera_model.json
    detector: image_depth_camera_model
    modality: camera_depth

  benchmark:
    enabled: true
    mode: opv2v_benchmark_a_profile
    python_bin: /home/qqxluca/miniconda3/envs/heal/bin/python
    note: pipeline_smoke_benchmark_a
    inputs:
      model_dir: /home/qqxluca/HEAL_benchmark_20260422/opencood/fusion/checkpoints/opv2v_camera_v2xvit_full_prope
      test_dir: /data2/OPV2V/test
      depth_root: /data2/opv2v_depth/test
    execution:
      gpus: "0"
      max_parallel: 1
      launch_delay_sec: 0.2
      poll_sec: 2.0
      abort_on_failure: true
    sweep:
      noises: [0, 1]
      core_noises: [0]
      oracle_anchor_noise: 1
      methods: [v2xregpp]
      bounds: [baseline, single, oracle]
    inference:
      fusion_method: intermediate
      save_vis_interval: 0
      num_workers: 0
      max_eval_samples: 2
      eval_sample_start: 0
      comm_range: 70.0
      comm_range_gating: clean
      pose_device: cuda
      force_pose_confidence: 1.0
      log_interval: 1

  registration:
    enabled: false
    mode: skip

  fusion:
    enabled: false
    mode: skip

  evaluation:
    enabled: true
    mode: collect_existing_artifacts
    include_stage_output_dirs: true
    search_roots: []
    patterns:
      - AP030507_*.yaml
      - AP030507_*.json
      - POSE_SOLVER_ONLY_*.yaml
      - POSE_SOLVER_ONLY_*.json
      - profile_*.json
      - benchmark_summary.json
